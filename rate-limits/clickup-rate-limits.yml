specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: ClickUp
providerId: clickup
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Project Management
description: 'ClickUp v2 API: 100 req/min on Free, scales by tier.'
sources:
  - https://clickup.com/pricing
  - https://clickup.com/api/developer-portal/rate-limits/
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
responseCodes:
  throttled: 429
limits:
  - name: REST API (Free)
    scope: user
    metric: requests_per_minute
    limit: 100
    timeFrame: minute
  - name: REST API (Unlimited)
    scope: user
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
  - name: REST API (Business)
    scope: user
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
  - name: REST API (Enterprise)
    scope: user
    metric: requests_per_minute
    limit: 10000
    timeFrame: minute
