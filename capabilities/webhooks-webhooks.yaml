naftiko: 1.0.0-alpha2
info:
  label: ClickUp Webhooks API — Webhooks
  description: 'ClickUp Webhooks API — Webhooks. 4 operations. Lead operation: Get webhooks. Self-contained Naftiko capability
    covering one Clickup business surface.'
  tags:
  - Clickup
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLICKUP_API_KEY: CLICKUP_API_KEY
capability:
  consumes:
  - type: http
    namespace: webhooks-webhooks
    baseUri: https://api.clickup.com/api/v2
    description: ClickUp Webhooks API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: team-team_id-webhook
      path: /team/{team_id}/webhook
      operations:
      - name: getwebhooks
        method: GET
        description: Get webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createwebhook
        method: POST
        description: Create a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhook-webhook_id
      path: /webhook/{webhook_id}
      operations:
      - name: updatewebhook
        method: PUT
        description: Update a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletewebhook
        method: DELETE
        description: Delete a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLICKUP_API_KEY}}'
  exposes:
  - type: rest
    namespace: webhooks-webhooks-rest
    port: 8080
    description: REST adapter for ClickUp Webhooks API — Webhooks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/team/{team-id}/webhook
      name: team-team-id-webhook
      description: REST surface for team-team_id-webhook.
      operations:
      - method: GET
        name: getwebhooks
        description: Get webhooks
        call: webhooks-webhooks.getwebhooks
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createwebhook
        description: Create a webhook
        call: webhooks-webhooks.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhook/{webhook-id}
      name: webhook-webhook-id
      description: REST surface for webhook-webhook_id.
      operations:
      - method: PUT
        name: updatewebhook
        description: Update a webhook
        call: webhooks-webhooks.updatewebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletewebhook
        description: Delete a webhook
        call: webhooks-webhooks.deletewebhook
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: webhooks-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for ClickUp Webhooks API — Webhooks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-webhooks
      description: Get webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: webhooks-webhooks.getwebhooks
      outputParameters:
      - type: object
        mapping: $.
    - name: create-webhook
      description: Create a webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: webhooks-webhooks.createwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-webhook
      description: Update a webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: webhooks-webhooks.updatewebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete a webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: webhooks-webhooks.deletewebhook
      outputParameters:
      - type: object
        mapping: $.
