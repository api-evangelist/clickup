      description: Get folder views
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: views-views.getfolderviews
      outputParameters:
      - type: object
        mapping: $.
    - name: get-list-views
      description: Get list views
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: views-views.getlistviews
      outputParameters:
      - type: object
