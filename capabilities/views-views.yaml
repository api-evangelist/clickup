    - name: get-space-views
      description: Get space views
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: views-views.getspaceviews
      outputParameters:
      - type: object
        mapping: $.
    - name: get-team-views
      description: Get team views
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: views-views.getteamviews
      outputParameters:
      - type: object
        mapping: $.
    - name: get-view
      description: Get a view
      hints:
        readOnly: true
        destructive: false
