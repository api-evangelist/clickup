      call: views-views.getview
      outputParameters:
      - type: object
        mapping: $.
    - name: update-view
      description: Update a view
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: views-views.updateview
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-view
      description: Delete a view
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: views-views.deleteview
      outputParameters:
      - type: object
        mapping: $.
    - name: get-view-tasks
      description: Get view tasks
      hints:
