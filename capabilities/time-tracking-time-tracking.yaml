naftiko: 1.0.0-alpha2
info:
  label: ClickUp Time Tracking API — Time Tracking
  description: 'ClickUp Time Tracking API — Time Tracking. 10 operations. Lead operation: Get time entries within a date range.
    Self-contained Naftiko capability covering one Clickup business surface.'
  tags:
  - Clickup
  - Time Tracking
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLICKUP_API_KEY: CLICKUP_API_KEY
capability:
  consumes:
  - type: http
    namespace: time-tracking-time-tracking
    baseUri: https://api.clickup.com/api/v2
    description: ClickUp Time Tracking API — Time Tracking business capability. Self-contained, no shared references.
    resources:
    - name: team-team_id-time_entries
      path: /team/{team_id}/time_entries
      operations:
      - name: gettimeentries
        method: GET
        description: Get time entries within a date range
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_date
          in: query
          type: integer
          description: Unix timestamp in milliseconds for the start of the date range.
        - name: end_date
          in: query
          type: integer
          description: Unix timestamp in milliseconds for the end of the date range.
        - name: assignee
          in: query
          type: string
          description: Comma-separated list of user IDs to filter by assignees.
        - name: include_task_tags
          in: query
          type: boolean
          description: Include tags from the associated tasks.
        - name: include_location_names
          in: query
          type: boolean
          description: Include names of the spaces, folders, and lists.
        - name: space_id
          in: query
          type: integer
          description: Filter by Space ID.
        - name: folder_id
          in: query
          type: integer
          description: Filter by Folder ID.
        - name: list_id
          in: query
          type: integer
          description: Filter by List ID.
        - name: task_id
          in: query
          type: string
          description: Filter by Task ID.
        - name: custom_task_ids
          in: query
          type: boolean
          description: If true, the task_id parameter should be a custom task ID.
      - name: createtimeentry
        method: POST
        description: Create a time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: custom_task_ids
          in: query
          type: boolean
          description: If true, the tid parameter should be a custom task ID.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: team-team_id-time_entries-current
      path: /team/{team_id}/time_entries/current
      operations:
      - name: getcurrenttimeentry
        method: GET
        description: Get running time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: assignee
          in: query
          type: integer
          description: User ID to get the running timer for. Defaults to the authenticated user.
    - name: team-team_id-time_entries-start-timer_id
      path: /team/{team_id}/time_entries/start/{timer_id}
      operations:
      - name: starttimeentry
        method: POST
        description: Start a time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: team-team_id-time_entries-stop
      path: /team/{team_id}/time_entries/stop
      operations:
      - name: stoptimeentry
        method: POST
        description: Stop a time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: team-team_id-time_entries-tags
      path: /team/{team_id}/time_entries/tags
      operations:
      - name: gettimeentrytags
        method: GET
        description: Get all time entry tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addtagstotimeentries
        method: POST
        description: Add tags to time entries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: team-team_id-time_entries-timer_id
      path: /team/{team_id}/time_entries/{timer_id}
      operations:
      - name: getsingletimeentry
        method: GET
        description: Get a single time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetimeentry
        method: PUT
        description: Update a time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: custom_task_ids
          in: query
          type: boolean
          description: If true, the tid parameter should be a custom task ID.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletetimeentry
        method: DELETE
        description: Delete a time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLICKUP_API_KEY}}'
  exposes:
  - type: rest
    namespace: time-tracking-time-tracking-rest
    port: 8080
    description: REST adapter for ClickUp Time Tracking API — Time Tracking. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/team/{team-id}/time-entries
      name: team-team-id-time-entries
      description: REST surface for team-team_id-time_entries.
      operations:
      - method: GET
        name: gettimeentries
        description: Get time entries within a date range
        call: time-tracking-time-tracking.gettimeentries
        with:
          start_date: rest.start_date
          end_date: rest.end_date
          assignee: rest.assignee
          include_task_tags: rest.include_task_tags
          include_location_names: rest.include_location_names
          space_id: rest.space_id
          folder_id: rest.folder_id
          list_id: rest.list_id
          task_id: rest.task_id
          custom_task_ids: rest.custom_task_ids
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtimeentry
        description: Create a time entry
        call: time-tracking-time-tracking.createtimeentry
        with:
          custom_task_ids: rest.custom_task_ids
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/team/{team-id}/time-entries/current
      name: team-team-id-time-entries-current
      description: REST surface for team-team_id-time_entries-current.
      operations:
      - method: GET
        name: getcurrenttimeentry
        description: Get running time entry
        call: time-tracking-time-tracking.getcurrenttimeentry
        with:
          assignee: rest.assignee
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/team/{team-id}/time-entries/start/{timer-id}
      name: team-team-id-time-entries-start-timer-id
      description: REST surface for team-team_id-time_entries-start-timer_id.
      operations:
      - method: POST
        name: starttimeentry
        description: Start a time entry
        call: time-tracking-time-tracking.starttimeentry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/team/{team-id}/time-entries/stop
      name: team-team-id-time-entries-stop
      description: REST surface for team-team_id-time_entries-stop.
      operations:
      - method: POST
        name: stoptimeentry
        description: Stop a time entry
        call: time-tracking-time-tracking.stoptimeentry
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/team/{team-id}/time-entries/tags
      name: team-team-id-time-entries-tags
      description: REST surface for team-team_id-time_entries-tags.
      operations:
      - method: GET
        name: gettimeentrytags
        description: Get all time entry tags
        call: time-tracking-time-tracking.gettimeentrytags
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addtagstotimeentries
        description: Add tags to time entries
        call: time-tracking-time-tracking.addtagstotimeentries
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/team/{team-id}/time-entries/{timer-id}
      name: team-team-id-time-entries-timer-id
      description: REST surface for team-team_id-time_entries-timer_id.
      operations:
      - method: GET
        name: getsingletimeentry
        description: Get a single time entry
        call: time-tracking-time-tracking.getsingletimeentry
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatetimeentry
        description: Update a time entry
        call: time-tracking-time-tracking.updatetimeentry
        with:
          custom_task_ids: rest.custom_task_ids
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetimeentry
        description: Delete a time entry
        call: time-tracking-time-tracking.deletetimeentry
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: time-tracking-time-tracking-mcp
    port: 9090
    transport: http
    description: MCP adapter for ClickUp Time Tracking API — Time Tracking. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-time-entries-within-date
      description: Get time entries within a date range
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: time-tracking-time-tracking.gettimeentries
      with:
        start_date: tools.start_date
        end_date: tools.end_date
        assignee: tools.assignee
        include_task_tags: tools.include_task_tags
        include_location_names: tools.include_location_names
        space_id: tools.space_id
        folder_id: tools.folder_id
        list_id: tools.list_id
        task_id: tools.task_id
        custom_task_ids: tools.custom_task_ids
      outputParameters:
      - type: object
        mapping: $.
    - name: create-time-entry
      description: Create a time entry
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: time-tracking-time-tracking.createtimeentry
      with:
        custom_task_ids: tools.custom_task_ids
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-running-time-entry
      description: Get running time entry
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: time-tracking-time-tracking.getcurrenttimeentry
      with:
        assignee: tools.assignee
      outputParameters:
      - type: object
        mapping: $.
    - name: start-time-entry
      description: Start a time entry
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: time-tracking-time-tracking.starttimeentry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stop-time-entry
      description: Stop a time entry
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: time-tracking-time-tracking.stoptimeentry
      outputParameters:
      - type: object
        mapping: $.
    - name: get-all-time-entry-tags
      description: Get all time entry tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: time-tracking-time-tracking.gettimeentrytags
      outputParameters:
      - type: object
        mapping: $.
    - name: add-tags-time-entries
      description: Add tags to time entries
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: time-tracking-time-tracking.addtagstotimeentries
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-single-time-entry
      description: Get a single time entry
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: time-tracking-time-tracking.getsingletimeentry
      outputParameters:
      - type: object
        mapping: $.
    - name: update-time-entry
      description: Update a time entry
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: time-tracking-time-tracking.updatetimeentry
      with:
        custom_task_ids: tools.custom_task_ids
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-time-entry
      description: Delete a time entry
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: time-tracking-time-tracking.deletetimeentry
      outputParameters:
      - type: object
        mapping: $.
