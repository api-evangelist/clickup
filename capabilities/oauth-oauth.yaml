naftiko: 1.0.0-alpha2
info:
  label: ClickUp OAuth API — OAuth
  description: 'ClickUp OAuth API — OAuth. 1 operations. Lead operation: Get access token. Self-contained Naftiko capability
    covering one Clickup business surface.'
  tags:
  - Clickup
  - OAuth
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLICKUP_API_KEY: CLICKUP_API_KEY
capability:
  consumes:
  - type: http
    namespace: oauth-oauth
    baseUri: https://api.clickup.com/api/v2
    description: ClickUp OAuth API — OAuth business capability. Self-contained, no shared references.
    resources:
    - name: oauth-token
      path: /oauth/token
      operations:
      - name: getaccesstoken
        method: POST
        description: Get access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: client_id
          in: query
          type: string
          description: The OAuth app client ID.
          required: true
        - name: client_secret
          in: query
          type: string
          description: The OAuth app client secret.
          required: true
        - name: code
          in: query
          type: string
          description: The authorization code received from the authorization step.
          required: true
    authentication:
      type: bearer
      token: '{{env.CLICKUP_API_KEY}}'
  exposes:
  - type: rest
    namespace: oauth-oauth-rest
    port: 8080
    description: REST adapter for ClickUp OAuth API — OAuth. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/oauth/token
      name: oauth-token
      description: REST surface for oauth-token.
      operations:
      - method: POST
        name: getaccesstoken
        description: Get access token
        call: oauth-oauth.getaccesstoken
        with:
          client_id: rest.client_id
          client_secret: rest.client_secret
          code: rest.code
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oauth-oauth-mcp
    port: 9090
    transport: http
    description: MCP adapter for ClickUp OAuth API — OAuth. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-access-token
      description: Get access token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: oauth-oauth.getaccesstoken
      with:
        client_id: tools.client_id
        client_secret: tools.client_secret
        code: tools.code
      outputParameters:
      - type: object
        mapping: $.
