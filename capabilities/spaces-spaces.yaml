naftiko: 1.0.0-alpha2
info:
  label: ClickUp Spaces API — Spaces
  description: 'ClickUp Spaces API — Spaces. 5 operations. Lead operation: Get a space. Self-contained Naftiko capability
    covering one Clickup business surface.'
  tags:
  - Clickup
  - Spaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLICKUP_API_KEY: CLICKUP_API_KEY
capability:
  consumes:
  - type: http
    namespace: spaces-spaces
    baseUri: https://api.clickup.com/api/v2
    description: ClickUp Spaces API — Spaces business capability. Self-contained, no shared references.
    resources:
    - name: space-space_id
      path: /space/{space_id}
      operations:
      - name: getspace
        method: GET
        description: Get a space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatespace
        method: PUT
        description: Update a space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletespace
        method: DELETE
        description: Delete a space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: team-team_id-space
      path: /team/{team_id}/space
      operations:
      - name: getspaces
        method: GET
        description: Get spaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: archived
          in: query
          type: boolean
          description: Include archived Spaces in the response.
      - name: createspace
        method: POST
        description: Create a space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CLICKUP_API_KEY}}'
  exposes:
  - type: rest
    namespace: spaces-spaces-rest
    port: 8080
    description: REST adapter for ClickUp Spaces API — Spaces. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/space/{space-id}
      name: space-space-id
      description: REST surface for space-space_id.
      operations:
      - method: GET
        name: getspace
        description: Get a space
        call: spaces-spaces.getspace
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatespace
        description: Update a space
        call: spaces-spaces.updatespace
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletespace
        description: Delete a space
        call: spaces-spaces.deletespace
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/team/{team-id}/space
      name: team-team-id-space
      description: REST surface for team-team_id-space.
      operations:
      - method: GET
        name: getspaces
        description: Get spaces
        call: spaces-spaces.getspaces
        with:
          archived: rest.archived
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createspace
        description: Create a space
        call: spaces-spaces.createspace
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spaces-spaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for ClickUp Spaces API — Spaces. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-space
      description: Get a space
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spaces-spaces.getspace
      outputParameters:
      - type: object
        mapping: $.
    - name: update-space
      description: Update a space
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: spaces-spaces.updatespace
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-space
      description: Delete a space
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: spaces-spaces.deletespace
      outputParameters:
      - type: object
        mapping: $.
    - name: get-spaces
      description: Get spaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spaces-spaces.getspaces
      with:
        archived: tools.archived
      outputParameters:
      - type: object
        mapping: $.
    - name: create-space
      description: Create a space
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: spaces-spaces.createspace
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
