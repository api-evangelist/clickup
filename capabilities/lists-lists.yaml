naftiko: 1.0.0-alpha2
info:
  label: ClickUp Lists API — Lists
  description: 'ClickUp Lists API — Lists. 8 operations. Lead operation: Get lists in a folder. Self-contained Naftiko capability
    covering one Clickup business surface.'
  tags:
  - Clickup
  - Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLICKUP_API_KEY: CLICKUP_API_KEY
capability:
  consumes:
  - type: http
    namespace: lists-lists
    baseUri: https://api.clickup.com/api/v2
    description: ClickUp Lists API — Lists business capability. Self-contained, no shared references.
    resources:
    - name: folder-folder_id-list
      path: /folder/{folder_id}/list
      operations:
      - name: getlists
        method: GET
        description: Get lists in a folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: archived
          in: query
          type: boolean
          description: Include archived Lists in the response.
      - name: createlist
        method: POST
        description: Create a list in a folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: list-list_id
      path: /list/{list_id}
      operations:
      - name: getlist
        method: GET
        description: Get a list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatelist
        method: PUT
        description: Update a list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletelist
        method: DELETE
        description: Delete a list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-list_id-member
      path: /list/{list_id}/member
      operations:
      - name: getlistmembers
        method: GET
        description: Get list members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: space-space_id-list
      path: /space/{space_id}/list
      operations:
      - name: getfolderlesslists
        method: GET
        description: Get folderless lists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: archived
          in: query
          type: boolean
          description: Include archived Lists in the response.
      - name: createfolderlesslist
        method: POST
        description: Create a folderless list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CLICKUP_API_KEY}}'
  exposes:
  - type: rest
    namespace: lists-lists-rest
    port: 8080
    description: REST adapter for ClickUp Lists API — Lists. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/folder/{folder-id}/list
      name: folder-folder-id-list
      description: REST surface for folder-folder_id-list.
      operations:
      - method: GET
        name: getlists
        description: Get lists in a folder
        call: lists-lists.getlists
        with:
          archived: rest.archived
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createlist
        description: Create a list in a folder
        call: lists-lists.createlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/list/{list-id}
      name: list-list-id
      description: REST surface for list-list_id.
      operations:
      - method: GET
        name: getlist
        description: Get a list
        call: lists-lists.getlist
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatelist
        description: Update a list
        call: lists-lists.updatelist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletelist
        description: Delete a list
        call: lists-lists.deletelist
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/list/{list-id}/member
      name: list-list-id-member
      description: REST surface for list-list_id-member.
      operations:
      - method: GET
        name: getlistmembers
        description: Get list members
        call: lists-lists.getlistmembers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/space/{space-id}/list
      name: space-space-id-list
      description: REST surface for space-space_id-list.
      operations:
      - method: GET
        name: getfolderlesslists
        description: Get folderless lists
        call: lists-lists.getfolderlesslists
        with:
          archived: rest.archived
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createfolderlesslist
        description: Create a folderless list
        call: lists-lists.createfolderlesslist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lists-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for ClickUp Lists API — Lists. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-lists-folder
      description: Get lists in a folder
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lists-lists.getlists
      with:
        archived: tools.archived
      outputParameters:
      - type: object
        mapping: $.
    - name: create-list-folder
      description: Create a list in a folder
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: lists-lists.createlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-list
      description: Get a list
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lists-lists.getlist
      outputParameters:
      - type: object
        mapping: $.
    - name: update-list
      description: Update a list
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: lists-lists.updatelist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-list
      description: Delete a list
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: lists-lists.deletelist
      outputParameters:
      - type: object
        mapping: $.
    - name: get-list-members
      description: Get list members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lists-lists.getlistmembers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-folderless-lists
      description: Get folderless lists
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lists-lists.getfolderlesslists
      with:
        archived: tools.archived
      outputParameters:
      - type: object
        mapping: $.
    - name: create-folderless-list
      description: Create a folderless list
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: lists-lists.createfolderlesslist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
