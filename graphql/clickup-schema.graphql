}

type WorkspaceFeatures {
  dueDates: FeatureConfig
  sprints: FeatureConfig
  points: FeatureConfig
  customFields: FeatureConfig
  portals: FeatureConfig
  zoom: FeatureConfig
  milestones: FeatureConfig
  emails: FeatureConfig
}

type FeatureConfig {
  enabled: Boolean!
}

type Space {
  id: ID!
