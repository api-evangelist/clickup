# -----------------------------------------------------------------------
# Query
# -----------------------------------------------------------------------

type Query {
  # Workspace / Teams
  workspaces: [Workspace!]!
  workspace(id: ID!): Workspace

  # Spaces
  spaces(workspaceId: ID!, archived: Boolean): [Space!]!
  space(id: ID!): Space

  # Folders
  folders(spaceId: ID!, archived: Boolean): [Folder!]!
  folder(id: ID!): Folder

  # Lists
  lists(folderId: ID!, archived: Boolean): [List!]!
  folderlessLists(spaceId: ID!, archived: Boolean): [List!]!
  list(id: ID!): List

  # Tasks
  tasks(listId: ID!, filter: TaskFilterInput): [Task!]!
  task(id: ID!, includeSubtasks: Boolean): Task
  filteredTeamTasks(workspaceId: ID!, filter: TaskFilterInput): [Task!]!
  searchTasks(workspaceId: ID!, query: String!): [Task!]!

  # Comments
  taskComments(taskId: ID!, start: String, startId: ID): [Comment!]!
  listComments(listId: ID!, start: String, startId: ID): [Comment!]!
  viewComments(viewId: ID!, start: String, startId: ID): [Comment!]!

  # Checklists (retrieved via task)
  taskChecklists(taskId: ID!): [Checklist!]!

  # Custom Fields
  listCustomFields(listId: ID!): [CustomField!]!
  accessibleCustomFields(listId: ID!): [CustomField!]!

  # Goals
  goals(workspaceId: ID!, includeCompleted: Boolean): [Goal!]!
  goal(id: ID!): Goal

  # Time Tracking
  timeEntries(workspaceId: ID!, filter: TimeEntryFilterInput): [TimeEntry!]!
  timeEntry(workspaceId: ID!, timerId: ID!): TimeEntry
  runningTimeEntry(workspaceId: ID!, assignee: Int): TimeEntry
  allTimeEntryTags(workspaceId: ID!): [TimeTag!]!
  singleTimeEntryHistory(workspaceId: ID!, timerId: ID!): TimeEntry

  # Members / Users
  workspaceMembers(workspaceId: ID!): [Member!]!
  listMembers(listId: ID!): [Member!]!
  spaceMembers(spaceId: ID!): [Member!]!
  guests(workspaceId: ID!): [Guest!]!
  guest(workspaceId: ID!, guestId: ID!): Guest
  authorizedUser: AuthorizedUser!

  # Tags
  spaceTags(spaceId: ID!): [Tag!]!

  # Views
  teamViews(workspaceId: ID!): [View!]!
  spaceViews(spaceId: ID!): [View!]!
  folderViews(folderId: ID!): [View!]!
  listViews(listId: ID!): [View!]!
  view(id: ID!): View
  viewTasks(viewId: ID!, page: Int): [Task!]!

  # Webhooks
  webhooks(workspaceId: ID!): [Webhook!]!

  # Templates
  templates(workspaceId: ID!, page: Int): [Template!]!

  # Sprints (via ClickUp Spaces with sprint feature enabled)
  sprints(listId: ID!): [Sprint!]!
}

# -----------------------------------------------------------------------
# Mutation
# -----------------------------------------------------------------------

type Mutation {
  # Tasks
  createTask(listId: ID!, input: CreateTaskInput!): Task!
  updateTask(taskId: ID!, input: UpdateTaskInput!): Task!
  deleteTask(taskId: ID!): Boolean!
  addTaskTag(taskId: ID!, tagName: String!): Boolean!
  removeTaskTag(taskId: ID!, tagName: String!): Boolean!
  addTaskDependency(taskId: ID!, dependsOn: ID!, type: DependencyType): Dependency!
  deleteTaskDependency(taskId: ID!, dependsOn: ID!, type: DependencyType): Boolean!
  addTaskLink(taskId: ID!, linksTo: ID!): Task!
  deleteTaskLink(taskId: ID!, linkId: ID!): Boolean!
  moveTask(taskId: ID!, listId: ID!): Task!
  duplicateTask(taskId: ID!, listId: ID!): Task!
  setCustomFieldValue(taskId: ID!, fieldId: ID!, value: JSON!): Boolean!
  removeCustomFieldValue(taskId: ID!, fieldId: ID!): Boolean!

  # Lists
  createList(folderId: ID!, input: CreateListInput!): List!
  createFolderlessList(spaceId: ID!, input: CreateListInput!): List!
  updateList(listId: ID!, input: UpdateListInput!): List!
  deleteList(listId: ID!): Boolean!
  addMemberToList(listId: ID!, userId: Int!): Boolean!
  removeMemberFromList(listId: ID!, userId: Int!): Boolean!

  # Folders
  createFolder(spaceId: ID!, input: CreateFolderInput!): Folder!
  updateFolder(folderId: ID!, input: UpdateFolderInput!): Folder!
  deleteFolder(folderId: ID!): Boolean!

  # Spaces
  createSpace(workspaceId: ID!, input: CreateSpaceInput!): Space!
  updateSpace(spaceId: ID!, input: UpdateSpaceInput!): Space!
  deleteSpace(spaceId: ID!): Boolean!

  # Comments
  createTaskComment(taskId: ID!, input: CreateCommentInput!): Comment!
  createListComment(listId: ID!, input: CreateCommentInput!): Comment!
  createViewComment(viewId: ID!, input: CreateCommentInput!): Comment!
  updateComment(commentId: ID!, commentText: String!, assignee: Int, resolved: Boolean): Comment!
  deleteComment(commentId: ID!): Boolean!

  # Checklists
  createChecklist(taskId: ID!, input: CreateChecklistInput!): Checklist!
  updateChecklist(checklistId: ID!, name: String, position: Int): Checklist!
  deleteChecklist(checklistId: ID!): Boolean!
  createChecklistItem(checklistId: ID!, input: CreateChecklistItemInput!): ChecklistItem!
  updateChecklistItem(checklistId: ID!, checklistItemId: ID!, name: String, assignee: Int, resolved: Boolean, parent: ID): ChecklistItem!
  deleteChecklistItem(checklistId: ID!, checklistItemId: ID!): Boolean!

  # Goals
  createGoal(workspaceId: ID!, input: CreateGoalInput!): Goal!
  updateGoal(goalId: ID!, input: UpdateGoalInput!): Goal!
  deleteGoal(goalId: ID!): Boolean!
  createKeyResult(goalId: ID!, input: CreateKeyResultInput!): GoalKeyResult!
  updateKeyResult(keyResultId: ID!, input: UpdateKeyResultInput!): GoalKeyResult!
  deleteKeyResult(keyResultId: ID!): Boolean!

  # Tags
  createSpaceTag(spaceId: ID!, name: String!, tagFg: String, tagBg: String): Tag!
  updateSpaceTag(spaceId: ID!, tagName: String!, name: String, tagFg: String, tagBg: String): Tag!
  deleteSpaceTag(spaceId: ID!, tagName: String!): Boolean!

  # Time Tracking
  createTimeEntry(workspaceId: ID!, input: CreateTimeEntryInput!): TimeEntry!
  updateTimeEntry(workspaceId: ID!, timerId: ID!, input: UpdateTimeEntryInput!): TimeEntry!
  deleteTimeEntry(workspaceId: ID!, timerId: ID!): TimeEntry!
  startTimer(workspaceId: ID!, taskId: ID): TimeEntry!
  stopTimer(workspaceId: ID!): TimeEntry!
  addTagsFromTimeEntries(workspaceId: ID!, tags: [JSON!]!): Boolean!
  deleteTagsFromTimeEntries(workspaceId: ID!, tags: [JSON!]!): Boolean!
  changeTagNamesFromTimeEntries(workspaceId: ID!, name: String!, newName: String!): Boolean!

  # Members / Guests
  inviteGuestToWorkspace(workspaceId: ID!, email: String!, canEditTags: Boolean, canSeeTimeSpent: Boolean, canSeeTimeEstimated: Boolean, canCreateViews: Boolean, customRoleId: Int): Guest!
  editGuestOnWorkspace(workspaceId: ID!, guestId: ID!, canEditTags: Boolean, canSeeTimeSpent: Boolean, canSeeTimeEstimated: Boolean, canCreateViews: Boolean, customRoleId: Int): Guest!
  removeGuestFromWorkspace(workspaceId: ID!, guestId: ID!): Boolean!
