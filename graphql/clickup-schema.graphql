"""
ClickUp Conceptual GraphQL Schema
Derived from the ClickUp REST API v2 (https://developer.clickup.com/reference)
No native GraphQL endpoint exists; this schema models the REST surface for tooling and catalog enrichment.
"""

# -----------------------------------------------------------------------
# Scalars
# -----------------------------------------------------------------------

scalar DateTime
scalar JSON
scalar Upload

# -----------------------------------------------------------------------
# Enums
# -----------------------------------------------------------------------

enum TaskPriority {
  URGENT
  HIGH
  NORMAL
  LOW
  NONE
}

enum TaskStatusType {
  OPEN
  CUSTOM
  DONE
  CLOSED
}

enum CustomFieldType {
  TEXT
  TEXTAREA
  NUMBER
  MONEY
  PERCENT
  DATE
  CHECKBOX
  DROPDOWN
  LABEL
  USERS
  EMAIL
  PHONE
  URL
  EMOJI
  RATING
  FORMULA
  RELATIONSHIP
  LOOKUP
  CREATED_BY
  CREATED_DATE
  AUTO_PROGRESS
  MANUAL_PROGRESS
  COUNT
  LOCATION
  TASKS
  ROLLUP
}

enum ViewType {
  LIST
  BOARD
  CALENDAR
  GANTT
  TABLE
  TIMELINE
  WORKLOAD
  MAP
  CHAT
  FORM
  MIND_MAP
  WHITEBOARD
}

enum CommentSource {
  TASK
  LIST
  VIEW
}

enum WebhookEvent {
  TASK_CREATED
  TASK_UPDATED
  TASK_DELETED
  TASK_PRIORITY_UPDATED
  TASK_STATUS_UPDATED
  TASK_ASSIGNEE_UPDATED
  TASK_DUE_DATE_UPDATED
  TASK_TAG_UPDATED
  TASK_MOVED
  TASK_COMMENT_POSTED
  TASK_COMMENT_UPDATED
  TASK_TIME_ESTIMATE_UPDATED
  TASK_TIME_TRACKED_UPDATED
  LIST_CREATED
  LIST_UPDATED
  LIST_DELETED
  FOLDER_CREATED
  FOLDER_UPDATED
  FOLDER_DELETED
  SPACE_CREATED
  SPACE_UPDATED
  SPACE_DELETED
  GOAL_CREATED
  GOAL_UPDATED
  GOAL_DELETED
  KEY_RESULT_CREATED
  KEY_RESULT_UPDATED
  KEY_RESULT_DELETED
}

enum GoalTargetType {
  NUMBER
  CURRENCY
  PERCENTAGE
  BOOLEAN
  TASK
}

enum MemberRole {
  OWNER
  ADMIN
  MEMBER
  GUEST
}

enum DependencyType {
  WAITING_ON
  BLOCKING
}

enum AutomationTrigger {
  TASK_CREATED
  TASK_STATUS_CHANGED
  TASK_PRIORITY_CHANGED
  TASK_ASSIGNEE_CHANGED
  TASK_DUE_DATE_CHANGED
  TASK_TAG_CHANGED
  TASK_COMMENT_ADDED
  DATE_TIME
  FORM_SUBMITTED
}

enum AutomationAction {
  CHANGE_STATUS
  ASSIGN_USER
  SET_PRIORITY
  ADD_TAG
  REMOVE_TAG
  SET_DUE_DATE
  MOVE_TASK
  CREATE_TASK
  SEND_EMAIL
  POST_COMMENT
  SEND_WEBHOOK
}

# -----------------------------------------------------------------------
# Core Types
# -----------------------------------------------------------------------

type Workspace {
  id: ID!
  name: String!
  color: String
  avatar: String
  members: [Member!]!
  spaces: [Space!]
  goals: [Goal!]
  webhooks: [Webhook!]
